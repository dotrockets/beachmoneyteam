<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e4050"/>
      <stop offset="50%" stop-color="#0a2c37"/>
      <stop offset="100%" stop-color="#12576f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#12576f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Headband - rounder, thicker Bose style -->
  <path d="M130 165 Q135 85 200 68 Q265 85 270 165" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
  <!-- Padding on headband -->
  <path d="M165 110 Q200 100 235 110" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.25"/>
  <!-- Left arm -->
  <path d="M130 165 Q128 190 130 218" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8" fill="none"/>
  <!-- Right arm -->
  <path d="M270 165 Q272 190 270 218" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.8" fill="none"/>
  <!-- Left ear cup - rounder Bose shape -->
  <ellipse cx="132" cy="245" rx="35" ry="42" fill="white" opacity="0.12"/>
  <ellipse cx="132" cy="245" rx="35" ry="42" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
  <ellipse cx="132" cy="245" rx="22" ry="30" fill="white" opacity="0.08"/>
  <!-- Right ear cup -->
  <ellipse cx="268" cy="245" rx="35" ry="42" fill="white" opacity="0.12"/>
  <ellipse cx="268" cy="245" rx="35" ry="42" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
  <ellipse cx="268" cy="245" rx="22" ry="30" fill="white" opacity="0.08"/>
  <!-- Ear cushion detail -->
  <ellipse cx="132" cy="245" rx="26" ry="34" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <ellipse cx="268" cy="245" rx="26" ry="34" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Subtle label -->
  <text x="200" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.35" letter-spacing="3">HEADPHONES</text>
</svg>