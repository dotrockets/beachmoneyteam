<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12576f"/>
      <stop offset="50%" stop-color="#0e4050"/>
      <stop offset="100%" stop-color="#0a2c37"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#12576f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Monitor body - premium thin bezels -->
  <rect x="90" y="88" width="220" height="148" rx="6" fill="url(#screenGrad)"/>
  <rect x="90" y="88" width="220" height="148" rx="6" fill="none" stroke="#e8d5b0" stroke-width="2" opacity="0.8"/>
  <!-- Screen area - very thin bezels (premium feel) -->
  <rect x="95" y="93" width="210" height="135" rx="3" fill="#e8d5b0" opacity="0.04"/>
  <rect x="95" y="93" width="210" height="135" rx="3" fill="none" stroke="#e8d5b0" stroke-width="0.6" opacity="0.25"/>
  <!-- 2K resolution hint -->
  <text x="200" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e8d5b0" opacity="0.2" font-weight="300" letter-spacing="2">2K</text>
  <!-- Premium stand - elegant single piece -->
  <path d="M185 236 L180 280" stroke="#e8d5b0" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none"/>
  <path d="M215 236 L220 280" stroke="#e8d5b0" stroke-width="3" stroke-linecap="round" opacity="0.7" fill="none"/>
  <!-- Stand base - sleek oval -->
  <ellipse cx="200" cy="285" rx="50" ry="8" fill="#e8d5b0" opacity="0.08"/>
  <ellipse cx="200" cy="285" rx="50" ry="8" fill="none" stroke="#e8d5b0" stroke-width="1.5" opacity="0.5"/>
  <!-- Side profile accent line -->
  <line x1="310" y1="100" x2="310" y2="130" stroke="#e8d5b0" stroke-width="1.5" opacity="0.2"/>
  <!-- USB-C port indicator -->
  <rect x="192" y="234" width="16" height="4" rx="2" fill="none" stroke="#e8d5b0" stroke-width="1" opacity="0.4"/>
  <!-- Premium corner accents -->
  <line x1="92" y1="98" x2="92" y2="105" stroke="#e8d5b0" stroke-width="1" opacity="0.2"/>
  <line x1="92" y1="98" x2="99" y2="98" stroke="#e8d5b0" stroke-width="1" opacity="0.2"/>
  <line x1="308" y1="98" x2="308" y2="105" stroke="#e8d5b0" stroke-width="1" opacity="0.2"/>
  <line x1="301" y1="98" x2="308" y2="98" stroke="#e8d5b0" stroke-width="1" opacity="0.2"/>
  <!-- Subtle label -->
  <text x="200" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e8d5b0" opacity="0.4" letter-spacing="3">PORTABLE MONITOR</text>
</svg>