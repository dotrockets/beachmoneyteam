<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a2c37"/>
      <stop offset="50%" stop-color="#0e4050"/>
      <stop offset="100%" stop-color="#12576f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#12576f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Powerbank body - chunky rectangle -->
  <rect x="120" y="115" width="160" height="195" rx="16" fill="url(#body)"/>
  <rect x="120" y="115" width="160" height="195" rx="16" fill="none" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <!-- Top edge highlight -->
  <path d="M136 115 L264 115" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Display area -->
  <rect x="150" y="145" width="100" height="45" rx="6" fill="white" opacity="0.08"/>
  <rect x="150" y="145" width="100" height="45" rx="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Battery percentage text -->
  <text x="200" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.6" font-weight="300">27,650</text>
  <text x="200" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white" opacity="0.35" letter-spacing="1">mAh</text>
  <!-- USB-C ports at bottom -->
  <rect x="155" y="265" width="24" height="10" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <rect x="188" y="265" width="24" height="10" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <rect x="221" y="265" width="24" height="10" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <!-- Power button -->
  <circle cx="200" cy="240" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="240" r="3" fill="white" opacity="0.25"/>
  <!-- Side grip lines -->
  <line x1="120" y1="180" x2="120" y2="200" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="280" y1="180" x2="280" y2="200" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- Subtle label -->
  <text x="200" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" opacity="0.35" letter-spacing="3">POWERBANK</text>
</svg>